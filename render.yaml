services:
  # Flask 后端 API 服务（同时提供前端页面）
  - type: web
    name: creator-ai-toolbox-api
    env: python
    region: oregon  # 美西俄勒冈，免费计划支持，国内访问延迟可接受
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false  # 在 Render Dashboard 手动设置
      - key: TOUTIAO_COOKIES
        sync: false  # 头条 Cookie，搜索/热榜功能需要
      - key: PYTHON_VERSION
        value: "3.11"
